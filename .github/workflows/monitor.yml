name: Education Update Monitor

on:
  schedule:
    # 每 6 小時（UTC）：香港時間 08:00 / 14:00 / 20:00 / 02:00
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只檢查，不發通知"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: education-monitor
  cancel-in-progress: false

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: data/state.json
          key: monitor-state-${{ github.repository }}-${{ github.ref }}
          restore-keys: |
            monitor-state-${{ github.repository }}-

      - name: Run monitor
        env:
          NOTIFY_CHANNELS: ${{ secrets.NOTIFY_CHANNELS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WHATSAPP_PROVIDER: ${{ secrets.WHATSAPP_PROVIDER }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          INITIAL_RUN_NOTIFY: ${{ secrets.INITIAL_RUN_NOTIFY }}
          EDB_CIRCULAR_LOOKBACK_DAYS: ${{ secrets.EDB_CIRCULAR_LOOKBACK_DAYS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m monitor.main --dry-run
          else
            python -m monitor.main
          fi

      - name: Build web dashboard
        run: |
          mkdir -p _site/data
          cp web/index.html web/app.js web/styles.css _site/
          cp data/dashboard.json _site/data/dashboard.json

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log
          path: data/monitor.log
          if-no-files-found: ignore

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
